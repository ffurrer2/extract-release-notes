# SPDX-License-Identifier: MIT
name: Licensed

on:
  push:
    branches:
    - main
    paths:
    - .github/workflows/licensed.yml
    - .licensed.yml
    - .licenses/**
    - package-lock.json
    - package.json

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # renovate: datasource=github-releases depName=licensed packageName=licensee/licensed versioning=semver
  LICENSED_VERSION: '5.1.0'

jobs:
  licensed:
    name: Check licenses
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .node-version
        cache: npm

    - name: Install packages
      run: |
        npm ci

    - name: Setup Ruby
      uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
      with:
        ruby-version: ruby

    - name: Setup Licensed
      uses: licensee/setup-licensed@0d52e575b3258417672be0dff2f115d7db8771d8 # v1.3.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        version: ${{ env.LICENSED_VERSION }}

    - name: Check Licenses
      run: |
        licensed status
