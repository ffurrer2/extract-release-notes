# SPDX-License-Identifier: MIT
name: Close stale issues and PRs
on:
  schedule:
  - cron: '0 0 * * *' # Runs every day at midnight

jobs:
  stale:
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      issues: write
      pull-requests: write
    steps:
    - uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629 # v10.4.0
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        days-before-stale: 30
        days-before-close: 7
        stale-issue-message: >
          This issue is stale because it has been open 30 days with no activity. Please comment if this is still relevant.
        stale-pr-message: >
          This PR is stale because it has been open 30 days with no activity. Please comment if this is still relevant.
        stale-issue-label: stale
        stale-pr-label: stale
        exempt-issue-labels: renovate
